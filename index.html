<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jargon Decoder</title>
    <link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet" />
    <style>
        :root {
            /* @style: Professional Medical Theme */
            --chat--color--primary: #0f172a;          /* Deep Slate */
            --chat--color--primary-shade-50: #1e293b;
            --chat--color--secondary: #0d9488;        /* Medical Teal */
            --chat--color--white: #ffffff;
            --chat--color--light: #f8fafc;
        }

        body { 
            margin: 0; 
            padding: 0; 
            background-color: var(--chat--color--light); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
        }

        /* Customizes the "Hi there" header specifically */
        .chat-header h1 {
            font-size: 1.5rem !important;
            font-weight: 700 !important;
            letter-spacing: -0.025em;
        }
    </style>
</head>
<body>
    <div id="n8n-chat"></div>
    <script type="module">
        import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js';

        createChat({
            /* @api: n8n Production Webhook Gateway */
            webhookUrl: 'https://rins99.app.n8n.cloud/webhook/831286d0-c427-4628-961e-c38130c8f048/chat',
            mode: 'fullscreen',
            showWelcomeScreen: true,
            
            /* UI Customization */
            i18n: {
                en: {
                    title: 'Clinical Decoder',
                    subtitle: 'Rins Enterprises Medical Intelligence',
                    footer: 'Confidential AI Analysis',
                    getStarted: 'Start New Decoding',
                    inputPlaceholder: 'Paste medical notes or jargon here...',
                }
            },
            initialMessages: [
                'Ready for analysis.',
                'Please provide the clinical text you wish to simplify.'
            ]
        });
    </script>
</body>
</html>
